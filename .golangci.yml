version: "2"

run:
  tests: true
  build-tags:
    - bench
    - "!bench"

linters:
  default: none
  enable:
    - asciicheck
    - dogsled
    - dupl
    - bodyclose
    - durationcheck
    - errorlint
    - exhaustive
    - copyloopvar
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goheader
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - lll
    - makezero
    - misspell
    - nestif
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - tagliatelle
    - thelper
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    funlen:
      lines: 150
      statements: 80
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - dupl
          - gocyclo
          - gosec

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
